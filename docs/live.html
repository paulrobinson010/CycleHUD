<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CycleHUD — Live ride</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; box-sizing: border-box; }
  [hidden] { display: none !important; }   /* beat the explicit display rules below */
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #0b1020; color: #eef2ff; height: 100dvh; display: flex; flex-direction: column; }
  header { padding: 12px 16px; display: flex; align-items: baseline; gap: 10px; }
  header h1 { font-size: 17px; font-weight: 800; }
  header span { font-size: 13px; color: #93a0c4; }
  #mapwrap { flex: 1; position: relative; }
  #map { position: absolute; inset: 0; }
  #banner { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            background: #e5484d; color: #fff; font-size: 15px; font-weight: 700;
            padding: 10px 18px; border-radius: 999px; white-space: nowrap;
            box-shadow: 0 4px 14px rgba(0,0,0,.45); z-index: 1000; }
  #stats { display: flex; gap: 18px; padding: 12px 16px; background: #101731; }
  .stat b { display: block; font-size: 20px; font-variant-numeric: tabular-nums; }
  .stat small { color: #93a0c4; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  #status { padding: 8px 16px; font-size: 13px; color: #93a0c4; background: #101731;
            border-top: 1px solid #1c2547; }
  #status.err { color: #ffb4a8; }
  .center { flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px; color: #93a0c4; font-size: 15px; line-height: 1.5; }
</style>
</head>
<body>
<header><h1>CycleHUD</h1><span>live ride</span></header>
<div id="mapwrap" hidden>
  <div id="map"></div>
  <div id="banner" hidden>Ride finished — this link is no longer live.</div>
</div>
<div id="message" class="center">Loading…</div>
<div id="stats" hidden>
  <div class="stat"><b id="speed">–</b><small id="speedUnit">km/h</small></div>
  <div class="stat"><b id="distance">–</b><small id="distanceUnit">km</small></div>
  <div class="stat"><b id="time">–</b><small>riding time</small></div>
</div>
<div id="status" hidden></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
// ---- configuration -------------------------------------------------------
// The app publishes to the CloudKit PUBLIC database of this container; this
// page reads it with a read-only web token generated in the CloudKit
// Dashboard (see docs/SETUP.md in the repository).
const CONTAINER = "iCloud.com.paulrobinson.CycleHUD";
const API_TOKEN = "412a74af6e4e8d1d722a1efda56fc6572f4ad2d20d3608bc8e83e42edcfdeef0";
const ENVIRONMENT = "production";
// ---------------------------------------------------------------------------

const token = location.hash.slice(1);
const message = document.getElementById("message");
const useMiles = navigator.language.startsWith("en-US") || navigator.language.startsWith("en-GB");

let map, marker, trail, trailCoords = [];

function fmtTime(s) {
  s = Math.floor(s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`
           : `${m}:${String(sec).padStart(2,"0")}`;
}

function showMessage(text, isError) {
  message.hidden = false;
  message.textContent = text;
  document.getElementById("mapwrap").hidden = true;
  document.getElementById("stats").hidden = true;
  document.getElementById("status").hidden = true;
  if (isError) message.classList.add("err");
}

/// The ride was live on this page and has now ended: keep the map and trail
/// visible, but make the state unmissable — banner over the map, stop polling.
function showEnded() {
  document.getElementById("banner").hidden = false;
  setStatus("Ride finished — the link is no longer live.", false);
  clearInterval(pollTimer);
}

async function poll() {
  let response;
  try {
    const url = `https://api.apple-cloudkit.com/database/1/${CONTAINER}/${ENVIRONMENT}/public/records/lookup?ckAPIToken=${API_TOKEN}`;
    response = await fetch(url, { method: "POST", body: JSON.stringify({ records: [{ recordName: `live-${token}` }] }) });
  } catch {
    setStatus("No connection — retrying…", true);
    return;
  }
  const json = await response.json().catch(() => null);
  console.log("CloudKit lookup", response.status, json);
  // Configuration problems come back as top-level or per-record error codes
  // that are NOT the ride's fault — surface them instead of "ride ended".
  const topError = json && json.serverErrorCode;
  const record = json && json.records && json.records[0];
  const recError = record && record.serverErrorCode;
  if (topError || (recError && recError !== "NOT_FOUND")) {
    const code = topError || recError;
    showMessage(`CloudKit error: ${code}. Check the API token, its allowed ` +
                `origins, and that the LiveRide schema is deployed to the ` +
                `${ENVIRONMENT} environment.`, true);
    return;
  }
  if (!record || recError === "NOT_FOUND") {
    // No record = the ride has ended (the app deletes it on Stop) — or it was
    // published to the other CloudKit environment (dev builds write to
    // Development; this page reads the environment configured above). Errors
    // are reported separately now, so a missing record is definitive.
    if (trailCoords.length) {
      showEnded();
    } else {
      showMessage("This ride has ended, or the link has expired. Links are only live while the ride is being recorded.");
    }
    return;
  }
  const f = record.fields || {};
  const lat = f.lat && f.lat.value, lon = f.lon && f.lon.value;
  if (typeof lat !== "number" || typeof lon !== "number") return;

  document.getElementById("mapwrap").hidden = false;
  document.getElementById("stats").hidden = false;
  document.getElementById("status").hidden = false;
  message.hidden = true;

  if (!map) {
    map = L.map("map").setView([lat, lon], 15);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                { attribution: "&copy; OpenStreetMap contributors", maxZoom: 19 }).addTo(map);
    trail = L.polyline([], { color: "#38e07b", weight: 4, opacity: 0.9 }).addTo(map);
    marker = L.circleMarker([lat, lon], { radius: 9, color: "#fff", weight: 2,
                                          fillColor: "#38e07b", fillOpacity: 1 }).addTo(map);
  }
  const p = [lat, lon];
  const last = trailCoords[trailCoords.length - 1];
  if (!last || last[0] !== lat || last[1] !== lon) {
    trailCoords.push(p);
    trail.setLatLngs(trailCoords);
  }
  marker.setLatLng(p);
  map.panTo(p);

  const speed = (f.speedMps ? f.speedMps.value : 0) * (useMiles ? 2.23694 : 3.6);
  const dist = (f.distanceMeters ? f.distanceMeters.value : 0) / (useMiles ? 1609.344 : 1000);
  document.getElementById("speed").textContent = speed.toFixed(1);
  document.getElementById("speedUnit").textContent = useMiles ? "mph" : "km/h";
  document.getElementById("distance").textContent = dist.toFixed(1);
  document.getElementById("distanceUnit").textContent = useMiles ? "mi" : "km";
  document.getElementById("time").textContent = fmtTime(f.movingSeconds ? f.movingSeconds.value : 0);

  const updated = f.updatedAt && f.updatedAt.value;
  const ago = updated ? Math.round((Date.now() - updated) / 1000) : null;
  const paused = f.paused && f.paused.value === 1;
  setStatus((paused ? "Paused · " : "") + (ago != null ? `updated ${ago}s ago` : "live"), false);
}

function setStatus(text, isError) {
  const el = document.getElementById("status");
  el.hidden = false;
  el.textContent = text;
  el.classList.toggle("err", !!isError);
}

let pollTimer;
if (!token) {
  showMessage("No ride token in the link.");
} else if (API_TOKEN.startsWith("PASTE_")) {
  showMessage("Live tracking isn't configured on this site yet (missing CloudKit web token).");
} else {
  poll();
  pollTimer = setInterval(poll, 15000);
}
</script>
</body>
</html>
